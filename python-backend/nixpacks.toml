[providers]
python = true

[phases.setup]
nixPkgs = [
    "python311",
    "fontconfig",
    "liberation_ttf",
    "gcc",
    "pkg-config",
    "cairo",
    "meson"
]
aptPkgs = [
    "build-essential",
    "pkg-config",
    "libcairo2-dev"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 4"
