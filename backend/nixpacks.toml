[providers]
node = true
python = true

[phases.setup]
nixPkgs = ["...", "python3", "python311Packages.pip"]

[phases.install]
cmds = [
    "npm install",
    "python -m venv .venv",
    ". .venv/bin/activate && pip install -r requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = ". .venv/bin/activate && npm start"
